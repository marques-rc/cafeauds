<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<meta name="description" content="Consulta os pareceres técnicos da ANS sobre cobertura de procedimentos, com resumo do posicionamento, status de cobertura e link para o PDF oficial. Módulo do CAFEAuds.">
<title>Pareceres Técnicos ANS</title>
<style>
:root{
  --bg:#f7f8fa;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;
  --line:#e3e7ee;--accent:#1f6feb;--accent-soft:#e8f0fe;
  --chip:#eef1f6;--radius:10px;
  --ok:#197a4b;--ok-soft:#eaf6f0;
  --dut:#1f6feb;--dut-soft:#e8f0fe;
  --warn:#9a6b00;--warn-soft:#fdf3dc;
  --no:#9a2b00;--no-soft:#fdecea;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1318;--panel:#171c23;--ink:#e6eaf0;--muted:#9aa6b6;
  --line:#28303a;--accent:#5b9bff;--accent-soft:#16263f;--chip:#222a34;
  --ok:#5fd39b;--ok-soft:#0d2018;
  --dut:#5b9bff;--dut-soft:#16263f;
  --warn:#e0b35a;--warn-soft:#2a1f00;
  --no:#ff7b6b;--no-soft:#2a0a00;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px;}
header h1{font-size:21px;margin:0 0 3px;}
header .meta{color:var(--muted);font-size:12px;margin-bottom:16px;}

/* back-link */
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--muted);text-decoration:none;background:var(--chip);border-radius:7px;
  padding:4px 10px;margin-bottom:12px;transition:color .15s,background .15s;}
.back-link:hover{color:var(--accent);background:var(--accent-soft);}
.back-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;}

/* search */
.searchbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
input[type=search]{flex:1;min-width:220px;padding:10px 13px;border:1px solid var(--line);
  border-radius:9px;background:var(--panel);color:var(--ink);font-size:15px;outline:none;}
input[type=search]:focus{border-color:var(--accent);}

/* filtros */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.filter-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);white-space:nowrap;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:4px 11px;border-radius:20px;font-size:12.5px;cursor:pointer;
  background:var(--chip);color:var(--muted);border:1px solid transparent;transition:all .15s;}
.chip:hover{background:var(--accent-soft);color:var(--accent);}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* count */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin:6px 0 10px;}
.count{color:var(--muted);font-size:12.5px;}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;transition:border-color .15s;}
.card:hover{border-color:var(--accent);}
.card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;}
.num-badge{background:var(--accent-soft);color:var(--accent);font-weight:700;
  border-radius:7px;padding:3px 10px;font-size:12.5px;white-space:nowrap;flex-shrink:0;
  font-variant-numeric:tabular-nums;}
.cov-badge{border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:700;
  white-space:nowrap;flex-shrink:0;}
.cov-ok{background:var(--ok-soft);color:var(--ok);}
.cov-dut{background:var(--dut-soft);color:var(--dut);}
.cov-warn{background:var(--warn-soft);color:var(--warn);}
.cov-no{background:var(--no-soft);color:var(--no);}
.card-title{font-size:14.5px;font-weight:600;flex:1;line-height:1.3;}
.card-resumo{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:10px;}
.card-links{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.btn{font-size:12px;font-weight:600;border:none;border-radius:7px;padding:5px 11px;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-pdf{background:var(--chip);color:var(--muted);}
.btn-pdf:hover{color:var(--accent);background:var(--accent-soft);}
.btn-pdf svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;}

.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px;}
mark{background:#ffe88a;color:#3a2e00;padding:0 1px;border-radius:2px;}
@media (prefers-color-scheme:dark){mark{background:#7a6a23;color:#fff;}}
</style>

<script>
const DATA = [{"n":"01/2024","titulo":"Nusinersena (SPINRAZA)","icone":"ok","status":"Coberto (internação)","resumo":"Cobertura obrigatória durante internação hospitalar para tratamento da Atrofia Muscular Espinhal 5q (AME), por via intratecal. Plano hospitalar/plano-referência.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-01_2024_medicamento-nusinersena-spinraza-r.pdf"},{"n":"02/2024","titulo":"Angiotomografia Coronariana","icone":"dut","status":"DUT 3","resumo":"Cobertura ambulatorial/hospitalar para avaliação inicial de pacientes sintomáticos com probabilidade pré-teste de doença coronariana entre 10% e 70% (critérios Diamond-Forrester). Exige aparelho multislice com 64+ detectores.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-02_2024_angiotomografia-coronariana.pdf"},{"n":"03/2024","titulo":"Antigenemia para Citomegalovírus","icone":"warn","status":"Cobertura restrita","resumo":"Cobertura obrigatória apenas pós-transplante previsto no Rol. Não há cobertura para outras indicações clínicas.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-03_2024_antigenemia-para-citomegalovirus.pdf"},{"n":"04/2024","titulo":"Aplicação de Plasma Rico em Plaquetas (PRP)","icone":"no","status":"Não coberto","resumo":"Considerado experimental pelo CFM (Parecer CFM nº 20/2011; Res. CFM 2.128/2015). Não previsto no Rol, sem cobertura obrigatória.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-04_2024_aplicacao-de-plasma-rico-em-plaquetas.pdf"},{"n":"05/2024","titulo":"Atenção Domiciliar (Homecare)","icone":"no","status":"Não obrigatório","resumo":"A Lei 9.656/1998 não prevê atenção domiciliar como cobertura obrigatória. Exceção: bolsas de colostomia/ileostomia/urostomia, sonda vesical e coletor de urina (art. 10-B). Internação domiciliar e assistência farmacêutica domiciliar não são obrigatórias.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-05_2024_atencao-domiciliar-home-care.pdf"},{"n":"06/2024","titulo":"Atendimento Ambulatorial em Puericultura","icone":"ok","status":"Coberto","resumo":"Coberto via procedimento \"Consulta Médica\" do Rol, em quantidade ilimitada para todas as especialidades reconhecidas pelo CFM. Não há código ou DUT específica para puericultura.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-06_2024_atendimento-ambulatorial-em-puericultura.pdf"},{"n":"07/2024","titulo":"Cifoplastia","icone":"no","status":"Não coberto","resumo":"Cifoplastia não está no Rol. O procedimento análogo Vertebroplastia (osteoplastia percutânea) está previsto no Rol e deve ser coberto por planos com segmentação hospitalar.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-07_2024_cifoplastia.pdf"},{"n":"08/2024","titulo":"Tratamento Fisioterápico, Psicológico, Fonoaudiológico e Terapia Ocupacional","icone":"ok","status":"Coberto (sem DUT desde 2022)","resumo":"A RN 541/2022 (vigente desde 1/8/2022) retirou as DUTs dessas sessões. A partir dessa data, consultas e sessões com psicólogos, fonoaudiólogos, terapeutas ocupacionais e fisioterapeutas têm cobertura ilimitada, conforme indicação do médico assistente.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-08_2024_consulta-sessao-com-psicologo-terapeuta-ocupacional.pdf"},{"n":"09/2024","titulo":"Ablação por Radiofrequência / Microondas / Crioablação Tumoral","icone":"dut","status":"com DUT","resumo":"Cobertura para ablação/crioablação do câncer primário hepático nas modalidades laparotomia, videolaparoscopia e percutânea guiada por USG/TC, cada uma com DUT específica. Plano hospitalar.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-09_2024_ablacao-por-radiofrequencia-microondas-crioablacao-tumoral.pdf"},{"n":"10/2024","titulo":"Abdominoplastia","icone":"dut","status":"DUT 18","resumo":"Cobertura obrigatória apenas para abdome em avental decorrente de grande perda ponderal após tratamento clínico de obesidade mórbida ou cirurgia bariátrica. Plano hospitalar.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-10_2024_abdominoplastia.pdf"},{"n":"11/2024","titulo":"Estudo Ultrassonográfico Intravascular","icone":"ok","status":"Coberto","resumo":"Previsto no Rol com cobertura hospitalar, conforme indicação do médico assistente. Contempla também a ultrassonografia intracoronariana.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-11_2024_estudo-ultrassonografico-intravascular.pdf"},{"n":"12/2024","titulo":"Gastroplastia (Cirurgia Bariátrica)","icone":"dut","status":"DUT 27","resumo":"Cobertura hospitalar para cirurgia bariátrica por videolaparoscopia ou laparotomia. Exige critérios de IMC, faixa etária (≥18 anos, ou 16-18 anos com escore-z >+4) e comorbidades conforme DUT 27.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-12_2024_gastroplastia-cirurgia-bariatrica-por-videolaparoscopia-ou-via-laparotomica.pdf"},{"n":"14/2024","titulo":"Implantação de Prótese Peniana Inflável","icone":"warn","status":"Cobertura parcial","resumo":"Prótese peniana semi-rígida está no Rol. Prótese peniana inflável não possui cobertura obrigatória.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-14_2024_implantacao-de-protese-peniana-inflavel.pdf"},{"n":"15/2024","titulo":"Implante Coclear / Prótese Auditiva Ancorada no Osso","icone":"dut","status":"DUT 33 e DUT 44","resumo":"Implante Coclear coberto com DUT nº 33; Prótese Auditiva Ancorada no Osso coberta com DUT nº 44. Ambos em plano hospitalar.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-15_2024_implante-coclear-implante-de-protese-auditiva-ancorada-no-osso.pdf"},{"n":"16/2024","titulo":"Implante de Cateter Tenckhoff","icone":"warn","status":"Técnica convencional coberta","resumo":"Técnica convencional está no Rol. Técnica por videolaparoscopia não tem cobertura obrigatória, pois técnicas minimamente invasivas só são cobertas quando especificadas no Rol (art. 12, RN 465/2021).","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-16_2024_implante-de-cateter-tenckhoff-por-videolaparoscopia.pdf"},{"n":"17/2024","titulo":"Laser em Oftalmologia","icone":"warn","status":"Cobertura condicionada","resumo":"Cobertura somente quando o procedimento a laser está expressamente previsto no Rol (art. 12, RN 465/2021). Abrange fotocoagulação, fotodisrupção, fotoablação e fotoquímica, conforme o procedimento especificado.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-17_2024_laser-em-oftalmologia.pdf"},{"n":"18/2024","titulo":"Lente Intraocular (Cirurgia de Catarata)","icone":"ok","status":"Coberto","resumo":"Facectomia com lente intraocular (com ou sem facoemulsificação) está no Rol. Cobertura ambulatorial/hospitalar. Inclui LIO monofocal; lentes premium (multifocais, tóricas premium) não têm cobertura obrigatória além da LIO padrão.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-18_2024_lente-intraocular-cirurgia-de-catarata.pdf"},{"n":"19/2024","titulo":"Mastectomia e Mamoplastia","icone":"ok","status":"Coberto (sem DUT)","resumo":"Mastectomia em todas as suas modalidades (radical, simples, dupla, conservadora, redutora de risco, etc.) está no Rol sem DUT, com cobertura ampla em planos hospitalares. Linfadenectomia axilar e reconstrução mamária pós-mastectomia também cobertas quando indicadas.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-19_2024_mama-e-sistema-linfatico_mastectomia-_mastoplastia.pdf"},{"n":"20/2024","titulo":"Medicamentos para Tratamento Domiciliar","icone":"no","status":"Não obrigatório (salvo exceções)","resumo":"Não há cobertura obrigatória para medicamentos domiciliares em geral. Exceções: antineoplásicos orais domiciliares e medicamentos adjuvantes/controle de efeitos adversos do tratamento antineoplásico oral ou venoso.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-20_2024_medicamentos-para-tratamento-domiciliar.pdf"},{"n":"21/2024","titulo":"Medicamentos (regras gerais)","icone":"warn","status":"Cobertura por segmentação","resumo":"Regras de cobertura variam por segmentação: ambulatorial cobre medicamentos dos procedimentos do Rol e quimioterapia oncológica; hospitalar cobre medicamentos durante internação. Não há obrigatoriedade de cobertura de medicamentos para uso domiciliar em geral.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-21_2024_medicamentos.pdf"},{"n":"22/2024","titulo":"Monitorização Neurofisiológica Intraoperatória","icone":"ok","status":"Coberto","resumo":"Prevista no Rol. Cobertura hospitalar conforme indicação do médico assistente. Inclui monitorização eletroneuromiográfica intraoperatória.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-22_2024_monitorizacao-neurofisiologica-intraoperatoria-ou-eletroneuromiografica.pdf"},{"n":"23/2024","titulo":"Nucleoplastia / Anuloplastia Percutânea (IDET)","icone":"no","status":"Não coberto","resumo":"Considerados experimentais pelo CFM (Pareceres CFM 15/2006, 54/2016 e 24/2017). Não estão no Rol, sem cobertura obrigatória.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-23_2024_nucleoplastia-percutanea-por-radiofrequencia_coagulacao_ablacao-anuloplastia-percutanea-por-energia-eletrotermic.pdf"},{"n":"24/2024","titulo":"OPME — Órteses, Próteses e Materiais Especiais","icone":"ok","status":"Coberto (vinculado ao ato cirúrgico)","resumo":"Cobertura obrigatória para OPMEs cuja colocação ou remoção requeira ato cirúrgico previsto no Rol. Próteses e órteses não ligadas ao ato cirúrgico são excluídas (art. 10, VII, Lei 9.656/1998).","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-24_2024_orteses-proteses-e-materiais-especiais_opme.pdf"},{"n":"25/2024","titulo":"Equoterapia, Hidroterapia, Pilates, RPG, Suits e Acompanhante Terapêutico","icone":"warn","status":"Cobertura condicionada","resumo":"Em geral não previstas no Rol como procedimentos autônomos. Para beneficiários com TEA/transtornos globais do desenvolvimento, a RN 539/2022 obriga a oferta do método indicado pelo médico assistente, independentemente de constar no Rol.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-25_2024_pilates-rpg-hidroterapia-equoterapia-e-outros_rn-539.pdf"},{"n":"26/2024","titulo":"Processo Transexualizador / Afirmação de Gênero","icone":"warn","status":"Cobertura parcial","resumo":"O conjunto do processo transexualizador não está no Rol. Procedimentos previstos no Rol individualmente têm cobertura se solicitados pelo médico assistente para pacientes com incongruência de gênero (CID F.64), respeitando eventuais DUTs.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-26_2024_processo-transexualizador-ou-de-afirmacao-de-genero.pdf"},{"n":"27/2024","titulo":"Pulsoterapia","icone":"ok","status":"Coberto","resumo":"Pulsoterapia está prevista no Rol, com cobertura obrigatória em planos ambulatoriais e/ou hospitalares, independente do medicamento, da doença ou de previsão em bula. A prescrição pode constar como \"pulsoterapia\", \"em pulsos\" ou expressão equivalente. Exceção: para medicamentos que possuam DUT própria (ex.: DUT 65, Terapia Imunobiológica; DUT 158, Terapia Medicamentosa Injetável Ambulatorial), os critérios da DUT respectiva devem ser atendidos.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-27_2024_pulsoterapia.pdf"},{"n":"28/2024","titulo":"Cross Linking da Córnea","icone":"dut","status":"DUT 121","resumo":"Cobertura para ceratocone progressivo comprovado por progressão do astigmatismo (≥1,00 D/ano) ou ceratometria máxima (Kmax ≥1,00 D/ano), sem contraindicações. Ambulatorial/hospitalar.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-28_2024_radiacao-para-cross-linking-da-cornea.pdf"},{"n":"29/2024","titulo":"Radiofármacos / Radioisótopos","icone":"ok","status":"Coberto (vinculado ao procedimento)","resumo":"Cobertura vinculada aos procedimentos do Rol que utilizam radiofármacos. A cobertura do radiofármaco segue a cobertura do procedimento ao qual está associado.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-29_2024_radiofarmacos-medicamentos-radiofarmacos-e-radioisotopos.pdf"},{"n":"30/2024","titulo":"Radioterapia com Modulação da Intensidade do Feixe (IMRT)","icone":"ok","status":"Coberto (anatomia específica)","resumo":"Cobertura restrita às indicações previstas no Rol: tumores de cabeça/pescoço, pulmão/mediastino/esôfago e neoplasias primárias da próstata. Não cobre IMRT em outras localizações anatômicas.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-30_2024_radioterapia-com-modulacao-da-intensidade-do-feixe-imrt.pdf"},{"n":"31/2024","titulo":"Radioterapia Estereotáxica Fracionada / Radiocirurgia (Gama-Knife)","icone":"ok","status":"Coberto","resumo":"Previstas no Rol com cobertura ambulatorial/hospitalar, sem restrição anatômica. Aplicáveis a qualquer parte do corpo conforme indicação do médico assistente.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-31_2024_radioterapia-estereotaxica-fracionada.pdf"},{"n":"32/2024","titulo":"Raio X — Fins Periciais e Administrativos","icone":"no","status":"Fins periciais não cobertos","resumo":"Exames radiológicos odontológicos estão no Rol para segmentação odontológica. Radiação ionizante para fins periciais, administrativos ou de saúde ocupacional não possui cobertura obrigatória pelos planos de saúde.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-32_2024_raio-x-radiacao-ionizante-fins-periciais-e-administrativos.pdf"},{"n":"33/2024","titulo":"Stent / Endoprótese","icone":"ok","status":"Coberto","resumo":"Diversos stents e endopróteses estão no Rol: coronários, vasculares, aórticos, endopróteses em aneurismas. Cobertura hospitalar conforme indicação do médico assistente.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-33_2024_stent-endoprotese.pdf"},{"n":"34/2024","titulo":"Técnica Minimamente Invasiva / Robótica / Navegador / Escopias","icone":"warn","status":"Cobertura condicionada","resumo":"Cobertura somente quando o procedimento realizado com técnica minimamente invasiva está expressamente previsto no Rol (art. 12, RN 465/2021). A escolha da técnica é prerrogativa do médico assistente, mas a cobertura obrigatória é do procedimento descrito no Rol.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-34_2024_tecnica-minimamente-invasiva-laser-navegador-robotica-escopias-radiofrequencia.pdf"},{"n":"35/2024","titulo":"Terapia Fotodinâmica","icone":"no","status":"Não coberto","resumo":"Não está prevista no Rol. Sem cobertura obrigatória.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-35_2024_terapia-fotodinamica.pdf"},{"n":"36/2024","titulo":"TAVI — Troca Valvar por Via Percutânea","icone":"dut","status":"DUT 143","resumo":"Cobertura para pacientes ≥75 anos, sintomáticos, com expectativa de vida >1 ano, inoperáveis ou alto risco cirúrgico (STS >8% ou EuroSCORE logístico >20%). Exige avaliação por equipe habilitada em TAVI.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-36_2024_troca-valvar-por-via-percutanea-tavi.pdf"},{"n":"37/2024","titulo":"Ultrassonografia Obstétrica com Translucência Nucal","icone":"dut","status":"DUT 76","resumo":"Cobertura obrigatória para gestantes com IG entre 11 semanas e 13 semanas e 6 dias, desde que a solicitação de autorização ocorra até 13s6d. Plano ambulatorial/hospitalar com obstetrícia.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-37_2024_ultrassonografia-obstetrica-com-translucencia-nucal-ultrassonografia-morfologica-fetal-do-1o-trimestre.pdf"},{"n":"38/2024","titulo":"Quimioterapia Intraperitoneal Hipertérmica (HIPEC)","icone":"warn","status":"Cobertura parcial","resumo":"Cobertura para tumores mucinosos do apêndice cecal, pseudomyxoma peritonei e mesotelioma peritoneal (reconhecidos pelo CFM, Parecer 6/2017). Sem cobertura para metástase peritoneal de carcinoma colorretal e carcinoma do ovário recidivado.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-38_2024_quimioterapia-intraperitoneal-hipertermica.pdf"},{"n":"39/2024","titulo":"Transtorno do Espectro Autista — Abordagens e Terapias","icone":"ok","status":"Coberto (sessões ilimitadas)","resumo":"A RN 469/2021 garante sessões ilimitadas para beneficiários com TEA. A RN 539/2022 obriga a oferta do método indicado pelo médico assistente. Inclui ABA, ESDM e outros métodos reconhecidos.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-39_2024_terapias-e-metodos-transtorno-do-espectro-autista_rn-539-2022_rn-541-2022.pdf"},{"n":"40/2024","titulo":"Cannabis Sativa e Canabidiol","icone":"no","status":"Não coberto como domiciliar","resumo":"Não há cobertura obrigatória para fornecimento domiciliar. Cobertura possível apenas se prescrito durante internação hospitalar, conforme art. 12, II, alínea \"d\" da Lei 9.656/1998.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/parecer-tecnico-no-40_2024_medicamentos-a-base-de-cannabis-sativa-e-canabidiol.pdf"},{"n":"41/2025","titulo":"Litotripsia Intravascular","icone":"ok","status":"Coberto","resumo":"Prevista no Rol. Cobertura obrigatória para os materiais necessários à realização do procedimento, desde que registrados na ANVISA e com indicações constantes em bula/manual.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/PARECER_TCNICO_N_41_2025_LITOTRIPSIA_INTRAVASCULAR.pdf"},{"n":"42/2025","titulo":"Avaliação e Terapia do Processamento Auditivo Central","icone":"dut","status":"DUT 5","resumo":"Cobertura para Audiometria Vocal com Mensagem Competitiva e Avaliação do Processamento Auditivo Central quando cumpridos os critérios da DUT nº 5.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/PARECER_TCNICO_N_42_2025_AVALIAO_E_TERAPIA_DO_PROCESSAMENTO_AUDITIVO_CENTRAL.pdf"},{"n":"43/2025","titulo":"Tomografia de Tórax de Baixa Dose (TCBD)","icone":"dut","status":"com DUT","resumo":"Coberta via procedimento \"Tomografia Computadorizada de Tórax\" do Rol, com DUT específica para rastreamento de câncer de pulmão em populações de risco.","url":"https://www.gov.br/ans/pt-br/arquivos/acesso-a-informacao/transparencia-institucional/pareceres-tecnicos-da-ans/2024/PARECER_TCNICO_N_43_2025_TOMOGRAFIA_DE_TRAX_DE_BAIXA_DOSE__TCBD_.pdf"}];

const COV = {
  ok:  {cls:'cov-ok',  label:'Coberto'},
  dut: {cls:'cov-dut', label:'Com DUT'},
  warn:{cls:'cov-warn',label:'Parcial'},
  no:  {cls:'cov-no',  label:'Não coberto'}
};
const PDF_ICO = '<svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>';

document.getElementById('meta').textContent =
  DATA.length + ' pareceres técnicos · GCITS/GGRAS/DIPRO · ANS';

let filtroAtivo = 'all';
let query = '';

function hl(txt, q) {
  if (!q) return txt;
  return txt.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),
    '<mark>$1</mark>');
}

function render() {
  const q = query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const visible = DATA.filter(p => {
    if (filtroAtivo !== 'all' && p.icone !== filtroAtivo) return false;
    if (!q) return true;
    const hay = (p.titulo+' '+p.resumo+' '+p.n+' '+p.status)
      .toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return hay.includes(q);
  });
  document.getElementById('count').textContent =
    visible.length === DATA.length
      ? DATA.length + ' pareceres'
      : visible.length + ' de ' + DATA.length + ' pareceres';

  if (!visible.length) {
    document.getElementById('list').innerHTML =
      '<div class="empty">Nenhum parecer encontrado para essa busca.</div>';
    return;
  }

  const raw = query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  document.getElementById('list').innerHTML = visible.map(p => {
    const cov = COV[p.icone] || COV.warn;
    const tit = hl(p.titulo, raw);
    const res = hl(p.resumo, raw);
    const pdfBtn = p.url
      ? `<a class="btn btn-pdf" href="${p.url}" target="_blank" rel="noopener">${PDF_ICO} Parecer PDF</a>`
      : '';
    return `<div class="card">
  <div class="card-head">
    <span class="num-badge">Nº ${p.n}</span>
    <span class="card-title">${tit}</span>
    <span class="cov-badge ${cov.cls}">${p.status || cov.label}</span>
  </div>
  <div class="card-resumo">${res}</div>
  <div class="card-links">${pdfBtn}</div>
</div>`;
  }).join('');
}

// Search
document.getElementById('q').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

// Filter chips
document.getElementById('filter-chips').addEventListener('click', e => {
  const chip = e.target.closest('[data-f]');
  if (!chip) return;
  filtroAtivo = chip.dataset.f;
  document.querySelectorAll('[data-f]').forEach(c => c.classList.toggle('on', c===chip));
  render();
});

render();
</script>
