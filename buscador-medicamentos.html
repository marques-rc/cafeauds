<style>
:root{
  --bg:#f7f8fa;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;
  --line:#e3e7ee;--accent:#1f6feb;--accent-soft:#e8f0fe;
  --chip:#eef1f6;--ok:#197a4b;--radius:10px;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1318;--panel:#171c23;--ink:#e6eaf0;--muted:#9aa6b6;
  --line:#28303a;--accent:#5b9bff;--accent-soft:#16263f;--chip:#222a34;--ok:#5fd39b;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:1020px;margin:0 auto;padding:18px 16px 60px;}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--muted);text-decoration:none;background:var(--chip);border-radius:7px;
  padding:4px 10px;margin-bottom:14px;transition:color .15s,background .15s;}
.back-link:hover{color:var(--accent);background:var(--accent-soft);}
.back-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;}
header h1{font-size:20px;margin:0 0 2px;}
header .meta{color:var(--muted);font-size:12px;margin-bottom:14px;}
.searchbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
input[type=search]{flex:1;padding:11px 14px;border:1px solid var(--line);
  border-radius:9px;background:var(--panel);color:var(--ink);font-size:15px;outline:none;}
input[type=search]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.count{color:var(--muted);font-size:12px;margin:4px 2px 8px;min-height:18px;}
table{width:100%;border-collapse:collapse;background:var(--panel);
  border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top;}
th{background:var(--chip);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--accent-soft);}
.nome{font-weight:600;}
.subst{color:var(--muted);font-size:13px;}
.bula-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  color:var(--accent);text-decoration:none;background:var(--accent-soft);
  border-radius:6px;padding:3px 9px;white-space:nowrap;}
.bula-link:hover{filter:brightness(.92);}
.bula-link svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;}
.placeholder{text-align:center;color:var(--muted);padding:48px 20px;}
.placeholder svg{width:40px;height:40px;stroke:var(--muted);fill:none;stroke-width:1.3;
  stroke-linecap:round;stroke-linejoin:round;margin-bottom:10px;opacity:.5;}
.placeholder p{margin:4px 0;font-size:14px;}
.placeholder small{font-size:12px;}
.truncar{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:420px;}
mark{background:#ffe88a;color:#3a2e00;border-radius:2px;padding:0 1px;}
@media (prefers-color-scheme:dark){mark{background:#7a6a23;color:#fff;}}
#tbl-wrap{display:none;}
</style>
</head>

const MAX=300;

function norm(s){
  return s.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function hl(s,t){
  if(!t)return esc(s);
  const ns=norm(s),nt=norm(t);
  let r='',i=0;
  while(i<s.length){
    const idx=ns.indexOf(nt,i);
    if(idx<0){r+=esc(s.slice(i));break;}
    r+=esc(s.slice(i,idx))+'<mark>'+esc(s.slice(idx,idx+nt.length))+'</mark>';
    i=idx+nt.length;
  }
  return r;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const tbody=document.getElementById('tbody');
const countEl=document.getElementById('count');
const placeholder=document.getElementById('placeholder');
const tblWrap=document.getElementById('tbl-wrap');

let timer=null;
document.getElementById('q').addEventListener('input',function(){
  clearTimeout(timer);
  timer=setTimeout(()=>buscar(this.value.trim()),180);
});

function buscar(q){
  if(q.length<2){
    placeholder.style.display='';
    tblWrap.style.display='none';
    countEl.textContent='';
    return;
  }
  const nq=norm(q);
  const matches=DATA.filter(r=>norm(r[0]).includes(nq)||norm(r[1]).includes(nq));
  const total=matches.length;
  const slice=matches.slice(0,MAX);

  placeholder.style.display='none';
  tblWrap.style.display='block';

  if(total===0){
    countEl.textContent='Nenhum resultado para "'+esc(q)+'"';
    tbody.innerHTML='<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:24px;">Nenhum medicamento encontrado.</td></tr>';
    return;
  }

  countEl.textContent=total<=MAX
    ? total+' resultado'+(total>1?'s':'')
    : MAX+' de '+total+' resultados — refine a busca para ver mais';

  tbody.innerHTML=slice.map(r=>{
    const bula='https://consultas.anvisa.gov.br/#/bulario/q/?nomeProduto='+encodeURIComponent(r[0]);
    return '<tr>'
      +'<td class="nome truncar">'+hl(r[0],q)+'</td>'
      +'<td class="subst truncar">'+hl(r[1],q)+'</td>'
      +'<td><a class="bula-link" href="'+bula+'" target="_blank" rel="noopener">'
      +'<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>'
      +'<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
      +'Bula</a></td>'
      +'</tr>';
  }).join('');
}
</script>
</body>
</html>
