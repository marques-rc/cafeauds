<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<meta name="description" content="CAFEAuds — Caixa de Ferramentas do Auditor em Saúde Suplementar. Módulos de consulta para auditoria médica: códigos TUSS, Diretrizes de Utilização (DUT), Resoluções Normativas e Pareceres Técnicos da ANS.">
<title>CAFEAuds — Caixa de Ferramentas do Auditor</title>
<style>
:root{
  --bg:#f7f8fa; --panel:#ffffff; --ink:#1c2430; --muted:#5b6675;
  --line:#e3e7ee; --accent:#1f6feb; --accent-soft:#e8f0fe; --chip:#eef1f6;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1318;--panel:#171c23;--ink:#e6eaf0;--muted:#9aa6b6;
  --line:#28303a;--accent:#5b9bff;--accent-soft:#16263f;--chip:#222a34;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:920px;margin:0 auto;padding:32px 18px 70px;}
.brand{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
.brand h1{font-size:23px;margin:0;}
.brand .sub{font-size:13px;color:var(--muted);}
header p{color:var(--muted);font-size:13px;margin:0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:24px;}
.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;
  transition:transform .12s,box-shadow .12s,border-color .12s;}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);border-color:var(--accent);}
.ico{width:46px;height:46px;border-radius:11px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;margin-bottom:13px;}
.ico svg{width:25px;height:25px;stroke:var(--accent);fill:none;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;}
.card h2{font-size:15.5px;margin:0 0 5px;}
.card p{font-size:12.8px;color:var(--muted);margin:0;flex:1;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.tags span{font-size:10.5px;font-weight:600;background:var(--chip);color:var(--muted);
  border-radius:5px;padding:2px 7px;}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;border:1px dashed var(--line);border-radius:14px;}
footer{margin-top:34px;color:var(--muted);font-size:11.5px;text-align:center;}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VFXMXE47YV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-VFXMXE47YV');
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>CAFEAuds</h1>
      <span class="sub">Caixa de Ferramentas do Auditor em Saúde Suplementar</span>
    </div>
    <p>Módulos de consulta e análise para auditoria médica em saúde suplementar. Selecione um módulo para abrir.</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer>CAFEAuds &middot; Ferramentas para Auditoria em Saúde Suplementar</footer>
</div>

<script>
const MODULOS = [
  {
    arquivo: "buscador-tuss-dut.html",
    titulo: "Buscador TUSS + DUT",
    descricao: "Busca códigos TUSS por nome ou número, mostra segmentação e abre o texto integral das 174 Diretrizes de Utilização.",
    tags: ["TUSS", "DUT", "Rol"],
    icone: "lupa"
  },
  {
    arquivo: "resolucoes-ans.html",
    titulo: "Resoluções Normativas ANS",
    descricao: "Busca e consulta nas resoluções normativas vigentes da ANS, com filtros por ano e tema e acesso ao texto completo.",
    tags: ["ANS", "Resoluções Normativas", "Rol"],
    icone: "lupa"
  },
  {
    arquivo: "pareceres-ans.html",
    titulo: "Pareceres Técnicos ANS",
    descricao: "Consulta os 42 pareceres técnicos da ANS sobre cobertura de procedimentos, com resumo, status de cobertura e link direto para o PDF oficial.",
    tags: ["ANS", "Cobertura", "Rol", "DUT"],
    icone: "doc"
  },
  {
    arquivo: "buscador-cid10.html",
    titulo: "Buscador CID-10",
    descricao: "Busca as 12.451 subcategorias da CID-10 por código ou descrição, com filtro por restrição de sexo e indicação dos códigos daga e asterisco.",
    tags: ["CID-10", "Diagnóstico", "Doenças"],
    icone: "lupa"
  },
  {
    arquivo: "propostas-atualizacao-rol.html",
    titulo: "Propostas de Atualização do Rol",
    descricao: "Consulta as 127 propostas (PAR) elegíveis desde 2021: pesquisa por tecnologia ou indicação, filtra por status (incorporado/não incorporado/em análise), tipo e ano, com link para a RN de incorporação.",
    tags: ["PAR", "Rol", "ANS", "Incorporação"],
    icone: "fluxo"
  },
  {
    arquivo: "buscador-medicamentos.html",
    titulo: "Medicamentos ANVISA",
    descricao: "Busca os 9.871 medicamentos com registro ativo na ANVISA por nome ou princípio ativo, com acesso direto ao Bulário Eletrônico para consulta da bula.",
    tags: ["ANVISA", "Medicamentos", "Bulário"],
    icone: "remedio"
  },
  {
    arquivo: "normas-cfm.html",
    titulo: "Normas CFM e CRMs",
    descricao: "Busca nas normas vigentes dos Conselhos de Medicina (resoluções, pareceres, emendas, normas e deliberações), com filtros por tipo, âmbito e ano e link para o PDF oficial.",
    tags: ["CFM", "CRM", "Ética Médica", "Normas"],
    icone: "lupa"
  }
];

const ICONES = {
  lupa:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>',
  doc:'<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>',
  tabela:'<rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="14" x2="21" y2="14"/><line x1="9" y1="4" x2="9" y2="20"/>',
  calc:'<rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="12" x2="9" y2="12"/><line x1="12" y1="12" x2="12" y2="12"/><line x1="15" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="9" y2="16"/><line x1="12" y1="16" x2="12" y2="16"/>',
  remedio:'<path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7Z"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/>',
  livro:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/>',
  fluxo:'<rect x="4" y="3" width="7" height="5" rx="1"/><rect x="13" y="16" width="7" height="5" rx="1"/><path d="M7.5 8v5a3 3 0 0 0 3 3h3"/>'
};

const grid = document.getElementById('grid');
if(!MODULOS.length){
  grid.innerHTML = '<div class="empty">Nenhum módulo disponível.</div>';
}else{
  grid.innerHTML = MODULOS.map(a => {
    const svg = ICONES[a.icone] || ICONES.doc;
    const tags = (a.tags||[]).map(t=>'<span>'+t+'</span>').join('');
    return '<a class="card" href="'+encodeURI(a.arquivo)+'">'
      + '<div class="ico"><svg viewBox="0 0 24 24">'+svg+'</svg></div>'
      + '<h2>'+a.titulo+'</h2>'
      + '<p>'+a.descricao+'</p>'
      + '<div class="tags">'+tags+'</div></a>';
  }).join('');
}
</script>
</body>
</html>
