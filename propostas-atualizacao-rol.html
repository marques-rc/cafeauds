<style>
:root{
  --bg:#f7f8fa; --panel:#ffffff; --ink:#1c2430; --muted:#5b6675;
  --line:#e3e7ee; --accent:#1f6feb; --accent-soft:#e8f0fe;
  --chip:#eef1f6; --ok:#197a4b; --warn:#9a6b00; --danger:#9a2b00;
  --radius:10px;
  --ok-bg:#edfaf3; --warn-bg:#fdf8e6; --danger-bg:#fff0ef;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1318;--panel:#171c23;--ink:#e6eaf0;--muted:#9aa6b6;
  --line:#28303a;--accent:#5b9bff;--accent-soft:#16263f;--chip:#222a34;
  --ok:#5fd39b;--warn:#e0b35a;--danger:#ff7b6b;
  --ok-bg:#0d2a1c;--warn-bg:#2a2000;--danger-bg:#2a0d0a;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
header h1{font-size:21px;margin:0 0 3px;}
header .meta{color:var(--muted);font-size:12px;margin-bottom:16px;}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--muted);text-decoration:none;background:var(--chip);border-radius:7px;
  padding:4px 10px;margin-bottom:12px;transition:color .15s,background .15s;}
.back-link:hover{color:var(--accent);background:var(--accent-soft);}
.back-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;}
mark{background:#ffe88a;color:#3a2e00;padding:0 1px;border-radius:2px;}
@media (prefers-color-scheme:dark){mark{background:#7a6a23;color:#fff;}}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 14px;text-align:center;}
.stat-card .num{font-size:26px;font-weight:700;line-height:1;}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-card.inc .num{color:var(--ok);}
.stat-card.nao .num{color:var(--danger);}
.stat-card.em  .num{color:var(--warn);}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--line);
  border-radius:8px;font-size:14px;background:var(--panel);color:var(--ink);}
.search-box:focus{outline:none;border-color:var(--accent);}

.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-start;}
.filter-group{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;letter-spacing:.3px;}
.fc{padding:4px 10px;border-radius:20px;border:1.5px solid var(--line);background:var(--chip);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--ink);white-space:nowrap;}
.fc:hover{border-color:var(--accent);color:var(--accent);}
.fc.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.fc.on-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);}
.fc.on-nao{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.fc.on-em{background:var(--warn-bg);border-color:var(--warn);color:var(--warn);}

.result-info{font-size:12px;color:var(--muted);margin-bottom:8px;min-height:16px;}

table{width:100%;border-collapse:collapse;}
thead th{font-size:11px;font-weight:700;color:var(--muted);text-align:left;
  padding:6px 8px;border-bottom:2px solid var(--line);white-space:nowrap;
  cursor:pointer;user-select:none;}
thead th:hover{color:var(--ink);}
.si{opacity:.35;font-size:10px;margin-left:3px;}
.sc .si::after{content:"↑";opacity:1;}
.sd .si::after{content:"↓";opacity:1;}
th:not(.sc):not(.sd) .si::after{content:"↕";}

.rw{border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
.rw:hover{background:var(--chip);}
.rw td{padding:8px;vertical-align:top;font-size:14px;}
.rw .c-uat{color:var(--muted);font-size:11px;white-space:nowrap;}
.rw .c-nome .nome{font-weight:600;font-size:14px;}
.rw .c-nome .ind{font-size:12px;color:var(--muted);margin-top:1px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.rw .c-ano{font-size:12px;color:var(--muted);white-space:nowrap;}
.rw .c-rn{font-size:12px;white-space:nowrap;}
.rn-tag{background:var(--accent-soft);color:var(--accent);border-radius:4px;
  padding:2px 6px;font-size:11px;font-weight:600;}

.sb{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.sI{background:var(--ok-bg);color:var(--ok);}
.sN{background:var(--danger-bg);color:var(--danger);}
.sE{background:var(--warn-bg);color:var(--warn);}
.tb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;
  font-weight:600;border:1px solid var(--line);color:var(--muted);white-space:nowrap;}

.det{display:none;background:var(--chip);padding:12px 14px;
  border-bottom:2px solid var(--line);}
.det.open{display:block;}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:10px;}
.di .dl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.di .dv{font-size:13px;margin-top:1px;word-break:break-word;}
.dst{padding:8px 10px;border-radius:6px;font-size:12px;line-height:1.4;}
.dst.sI{background:var(--ok-bg);}
.dst.sN{background:var(--danger-bg);}
.dst.sE{background:var(--warn-bg);}
.ind-full{margin-top:6px;padding:8px 10px;background:var(--panel);border-radius:6px;
  font-size:13px;border:1px solid var(--line);}

.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px;}
</style>

terosclerótico grave recente (<12 meses) e encontram-se fora da meta de LDL-c estabelecida para pacientes em muito alto risco cardiovascular (>50 mg/dL)","cp":171,"s":"E","st":"Em análise técnica"},{"a":2025,"u":186,"d":"2025-10-14","p":"2025.2.000299","pa":"33910.000998/2026-86","o":"Indústria","tt":"M","ttr":"Medicamento","n":"Encorafenibe associado a cetuximabe","i":"Tratamento, em primeira linha, de pacientes adultos com câncer colorretal metastático BRAF V600E+","cp":167,"s":"N","st":"Não incorporado. Deliberado na 635ª Reunião Ordinária de Diretoria Colegiada em 06/04/2026"},{"a":2025,"u":187,"d":"2025-10-20","p":"2025.1.000300","pa":"33910.012010/2026-21","o":"Sociedade médica","tt":"P","ttr":"Procedimento","n":"Ablação percutânea por cateter de campo pulsado","i":"Tratamento da fibrilação atrial paroxística","cp":null,"s":"E","st":"Em análise técnica"},{"a":2025,"u":188,"d":"2025-10-21","p":"2025.2.000301","pa":"33910.012010/2026-21","o":"Indústria","tt":"M","ttr":"Medicamento","n":"Bimequizumabe","i":"Tratamento da hidradenite supurativa ativa moderada a grave em adultos que falharam, apresentaram intolerância ou contraindicação à terapia com antibióticos sistêmicos","cp":null,"s":"E","st":"Em análise técnica"},{"a":2025,"u":189,"d":"2025-10-31","p":"2025.2.000304","pa":"33910.000998/2026-86","o":"Indústria","tt":"M","ttr":"Medicamento","n":"Mesilato de osimertinibe","i":"Tratamento de primeira linha de pacientes com câncer de pulmão não pequenas células (CPNPC) localmente avançado ou metastático, cujo tumor apresenta mutações de deleções no éxon 19 ou de substituição no éxon 21 (L858R) do EGFR, em combinação com pemetrexede e quimioterapia à base de platina.","cp":167,"s":"I","st":"Incorporado. RN 669, de 08/04/2026","rn":"RN 669"},{"a":2025,"u":190,"d":"2025-10-31","p":"2025.2.000305","pa":"33910.000998/2026-86","o":"Indústria","tt":"M","ttr":"Medicamento","n":"Talazoparibe","i":"Tratamento, em primeira linha, de pacientes homens adultos com câncer de pró a":null,"o":"Sociedade médica","tt":"P","ttr":"Procedimento diagnóstico/terapêutico","n":"Broncoscopia com criobiópsia","i":"Pacientes com suspeita de Doença Pulmonar Intersticial (DPI)","cp":null,"s":"E","st":"Em análise técnica"}];
const SL={I:'Incorporado',N:'Não incorporado',E:'Em análise'};
const TL={M:'Medicamento',P:'Procedimento',O:'Outro'};
let F={s:'all',tt:'all',a:'all'},Q='',SC='u',SD=1;

// Populate year buttons
const anos=[...new Set(DATA.map(r=>r.a).filter(Boolean))].sort();
const fa=document.getElementById('fanos');
['all',...anos].forEach(v=>{
  const b=document.createElement('button');
  b.className='fc'+(v==='all'?' on':''); b.dataset.f='a'; b.dataset.v=String(v);
  b.textContent=v==='all'?'Todos':v; fa.appendChild(b);
});

function hl(t,q){
  if(!q)return t;
  return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

function render(){
  const q=Q.trim().toLowerCase();
  let rows=DATA.filter(r=>{
    if(F.s!=='all'&&r.s!==F.s)return false;
    if(F.tt!=='all'&&r.tt!==F.tt)return false;
    if(F.a!=='all'&&String(r.a)!==F.a)return false;
    if(q&&!(r.n+' '+r.i).toLowerCase().includes(q))return false;
    return true;
  });
  rows.sort((a,b)=>{
    let va,vb;
    if(SC==='rn'){va=a.rn||'zzz';vb=b.rn||'zzz';}
    else{va=a[SC]??'';vb=b[SC]??'';}
    if(typeof va==='number'&&typeof vb==='number')return(va-vb)*SD;
    return String(va).localeCompare(String(vb),'pt-BR')*SD;
  });
  const tb=document.getElementById('tb');
  tb.innerHTML='';
  document.getElementById('rinfo').textContent=
    rows.length===DATA.length?'':
    `Exibindo ${rows.length} de ${DATA.length} propostas`;
  document.getElementById('empty').style.display=rows.length?'none':'block';
  rows.forEach((r,i)=>{
    const tr=document.createElement('tr'); tr.className='rw';
    const nhl=hl(r.n,q), ihl=hl(r.i,q);
    const rnCell=r.rn?`<span class="rn-tag">${r.rn}</span>`
      :'<span style="color:var(--muted);font-size:11px">—</span>';
    tr.innerHTML=`<td><span class="sb s${r.s}">${SL[r.s]}</span></td>
<td class="c-uat">${r.u?'#'+r.u:''}</td>
<td class="c-nome"><div class="nome">${nhl}</div><div class="ind">${ihl}</div></td>
<td><span class="tb">${TL[r.tt]}</span></td>
<td class="c-ano">${r.a||''}</td>
<td class="c-rn">${rnCell}</td>`;
    const dr=document.createElement('tr');
    const dd=document.createElement('td'); dd.colSpan=6;
    const cpTxt=r.cp?`<div class="di"><div class="dl">Consulta Pública</div><div class="dv">CP ${r.cp}</div></div>`:'';
    dd.innerHTML=`<div class="det" id="d${i}">
  <div class="dg">
    ${r.u?`<div class="di"><div class="dl">UAT</div><div class="dv">#${r.u}</div></div>`:''}
    <div class="di"><div class="dl">Protocolo PAR</div><div class="dv">${r.p||'N/I'}</div></div>
    <div class="di"><div class="dl">Processo Adm.</div><div class="dv">${r.pa||'N/I'}</div></div>
    <div class="di"><div class="dl">Origem</div><div class="dv">${r.o}</div></div>
    ${cpTxt}
    <div class="di"><div class="dl">Tipo de tecnologia</div><div class="dv">${r.ttr||TL[r.tt]}</div></div>
    <div class="di"><div class="dl">Data de envio</div><div class="dv">${r.d?r.d.split('-').reverse().join('/'):'N/I'}</div></div>
  </div>
  <div class="dst s${r.s}"><strong>Status:</strong> ${r.st}</div>
  <div class="ind-full"><strong>Indicação completa:</strong> ${r.i}</div>
</div>`;
    dr.appendChild(dd);
    tr.addEventListener('click',()=>{
      const d=document.getElementById('d'+i);
      const was=d.classList.contains('open');
      document.querySelectorAll('.det.open').forEach(x=>x.classList.remove('open'));
      if(!was)d.classList.add('open');
    });
    tb.appendChild(tr); tb.appendChild(dr);
  });
  // update sort headers
  document.querySelectorAll('thead th[data-c]').forEach(th=>{
    th.classList.remove('sc','sd');
    if(th.dataset.c===SC)th.classList.add(SD===1?'sc':'sd');
  });
}

document.querySelectorAll('.fc').forEach(b=>b.addEventListener('click',()=>{
  const f=b.dataset.f,v=b.dataset.v;
  F[f]=v;
  document.querySelectorAll(`.fc[data-f="${f}"]`).forEach(x=>x.classList.remove('on','on-ok','on-nao','on-em'));
  if(v==='I')b.classList.add('on-ok');
  else if(v==='N')b.classList.add('on-nao');
  else if(v==='E')b.classList.add('on-em');
  else b.classList.add('on');
  render();
}));

document.getElementById('srch').addEventListener('input',e=>{Q=e.target.value;render();});

document.querySelectorAll('thead th[data-c]').forEach(th=>th.addEventListener('click',()=>{
  const c=th.dataset.c;
  SC===c?SD=-SD:(SC=c,SD=1);
  render();
}));

render();
</script>
</body>
</html>
