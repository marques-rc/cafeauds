<meta name="description" content="Busca nas normas vigentes do CFM e CRMs (resoluções, pareceres, emendas, normas e deliberações), com filtros por tipo, âmbito e ano. Módulo do CAFEAuds.">
<title>Normas CFM e CRMs</title>
<style>
:root{
  --bg:#f7f8fa;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;
  --line:#e3e7ee;--accent:#1f6feb;--accent-soft:#e8f0fe;
  --chip:#eef1f6;--ok:#197a4b;--warn:#9a6b00;--danger:#9a2b00;
  --radius:10px;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1318;--panel:#171c23;--ink:#e6eaf0;--muted:#9aa6b6;
  --line:#28303a;--accent:#5b9bff;--accent-soft:#16263f;--chip:#222a34;
  --ok:#5fd39b;--warn:#e0b35a;--danger:#ff7b6b;}
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 60px;}
header h1{font-size:21px;margin:0 0 3px;}
header .meta{color:var(--muted);font-size:12px;margin-bottom:16px;}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--muted);text-decoration:none;background:var(--chip);border-radius:7px;
  padding:4px 10px;margin-bottom:12px;transition:color .15s,background .15s;}
.back-link:hover{color:var(--accent);background:var(--accent-soft);}
.back-link svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;}
mark{background:#ffe88a;color:#3a2e00;padding:0 1px;border-radius:2px;}
@media (prefers-color-scheme:dark){mark{background:#7a6a23;color:#fff;}}

/* busca */
.searchbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
input[type=search]{flex:1;min-width:220px;padding:10px 13px;border:1px solid var(--line);
  border-radius:9px;background:var(--panel);color:var(--ink);font-size:15px;outline:none;}
input[type=search]:focus{border-color:var(--accent);}

/* filtros chips */
.filter-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.filter-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);padding-top:5px;white-space:nowrap;min-width:40px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:4px 10px;border-radius:20px;font-size:12.5px;cursor:pointer;
  background:var(--chip);color:var(--muted);border:1px solid transparent;transition:all .15s;}
.chip:hover{background:var(--accent-soft);color:var(--accent);}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip.on:hover{background:#1258c0;}

/* selects */
.select-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
select{padding:7px 10px;border:1px solid var(--line);border-radius:9px;
  background:var(--panel);color:var(--ink);font-size:13.5px;outline:none;cursor:pointer;}
select:focus{border-color:var(--accent);}

/* toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin:10px 0 8px;}
.count{color:var(--muted);font-size:12.5px;}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:13px 15px;margin-bottom:7px;}
.card:hover{border-color:var(--accent);}
.card-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.badge{font-weight:700;border-radius:7px;padding:3px 9px;font-size:12.5px;white-space:nowrap;flex-shrink:0;}
.badge-tipo{background:var(--accent-soft);color:var(--accent);}
.badge-uf{background:var(--chip);color:var(--muted);}
.card-ementa{font-size:13.5px;line-height:1.5;margin-bottom:8px;color:var(--ink);}
.card-links{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.btn{font-size:12px;font-weight:600;border:none;border-radius:7px;padding:5px 11px;cursor:pointer;
  text-decoration:none;display:inline-block;transition:opacity .15s;}
.btn:hover{opacity:.8;}
.btn-pdf{background:var(--chip);color:var(--ink);}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px;}
</style>
</head>

let tipoAtivo = '', ufAtiva = '', anoAtivo = '', query = '';
const MAX = 200;

function hl(txt, q) {
  if (!q) return txt;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return txt.replace(re, '<mark>$1</mark>');
}

function render() {
  const q2 = query.toLowerCase();
  const filtered = DATA.filter(d => {
    if (tipoAtivo && d.t !== tipoAtivo) return false;
    if (ufAtiva && d.u !== ufAtiva) return false;
    if (anoAtivo && d.a !== +anoAtivo) return false;
    if (q2) {
      const haystack = (d.n + ' ' + d.e).toLowerCase();
      if (!haystack.includes(q2)) return false;
    }
    return true;
  });

  document.getElementById('count').textContent =
    filtered.length === 1 ? '1 norma' :
    filtered.length + ' normas' + (filtered.length > MAX ? ' (exibindo as ' + MAX + ' primeiras)' : '');

  const slice = filtered.slice(0, MAX);
  const lista = document.getElementById('lista');
  if (!slice.length) {
    lista.innerHTML = '<div class="empty">Nenhuma norma encontrada para os filtros selecionados.</div>';
    return;
  }

  lista.innerHTML = slice.map(d => {
    const conselho = d.u === 'BR' ? 'CFM' : 'CRM-' + d.u;
    const tipo_nome = TIPO_NOME[d.t] || d.t;
    const badge_label = tipo_nome + ' ' + d.n + '/' + d.a;
    const ementa_hl = hl(d.e || '(sem ementa)', q2);
    const badge_hl = hl(badge_label, q2);
    const link_pdf = d.p ? '<a class="btn btn-pdf" href="' + d.p + '" target="_blank" rel="noopener">Abrir PDF</a>' : '';
    return '<div class="card">'
      + '<div class="card-head">'
      + '<span class="badge badge-tipo">' + badge_hl + '</span>'
      + '<span class="badge badge-uf">' + conselho + '</span>'
      + '</div>'
      + '<div class="card-ementa">' + ementa_hl + '</div>'
      + '<div class="card-links">' + link_pdf + '</div>'
      + '</div>';
  }).join('');
}

// Chips tipo
document.getElementById('chips-tipo').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#chips-tipo .chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  tipoAtivo = chip.dataset.tipo;
  render();
});

// Selects
document.getElementById('sel-uf').addEventListener('change', e => { ufAtiva = e.target.value; render(); });
document.getElementById('sel-ano').addEventListener('change', e => { anoAtivo = e.target.value; render(); });

// Busca
let timer;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => { query = e.target.value.trim(); render(); }, 200);
});

render();
</script>
